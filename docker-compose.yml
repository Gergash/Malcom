services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow
      POSTGRES_DB: insightflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Worker Python: agentes + Orchestrator. Sin ports: → no expuesto al host; solo la API Go (WORKER_URL=http://brain:8001).
  brain:
    build: .
    command: uvicorn app.worker:app --host 0.0.0.0 --port 8001
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://insightflow:insightflow@postgres:5432/insightflow
    working_dir: /app
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # API Go (Malcom): borde público. Ngrok en el host debe apuntar a localhost:8080 → contenedor :8080.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://insightflow:insightflow@postgres:5432/insightflow
      WORKER_URL: http://brain:8001
      DATA_DIR: /app/data
      API_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      brain:
        condition: service_started
    restart: unless-stopped

  bot:
    build: .
    command: python app/main.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://insightflow:insightflow@postgres:5432/insightflow
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
