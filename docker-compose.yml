services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow
      POSTGRES_DB: insightflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    command: python app/main.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://insightflow:insightflow@postgres:5432/insightflow
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.api.app:app --host 0.0.0.0 --port 8080
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://insightflow:insightflow@postgres:5432/insightflow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
