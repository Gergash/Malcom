<script>
(function () {
  window.POWERUPS_WIDGET_LOADER = {
    assetsBase: "https://www.powerupsagencia.com/wp-content/uploads/2026/05/",
  };
  window.POWERUPS_WIDGET_CONFIG = Object.assign(
    {
      API_BASE: "https://meroblastic-estefana-isoperimetrical.ngrok-free.dev",
      CHECKOUT_URL: "https://www.powerupsagencia.com/premium-edge-bi/?chat_id={chatId}",
      PREMIUM_PORTAL_URL: "https://www.powerupsagencia.com/portal-premium/",
      DASHBOARD_SESSION_URL: "https://www.powerupsagencia.com/dashboard-premium-echarts/",
    },
    window.POWERUPS_WIDGET_CONFIG || {},
  );

  if (typeof document === "undefined") return;
  if (window.__POWERUPS_WIDGET_LOADER_RAN) return;
  window.__POWERUPS_WIDGET_LOADER_RAN = true;

  var LOADER = window.POWERUPS_WIDGET_LOADER || {};
  var cfg = window.POWERUPS_WIDGET_CONFIG || {};
  var baseDir = String(LOADER.assetsBase || "").trim().replace(/\/?$/, "/");
  if (!baseDir) return;

  var frameHref = LOADER.frameUrl || (baseDir + "powerups-edge-frame.html");
  var u;
  try {
    u = new URL(frameHref, window.location.href);
  } catch (e) {
    return;
  }

  var qp = [
    ["apiBase", cfg.API_BASE],
    ["checkoutUrl", cfg.CHECKOUT_URL],
    ["premiumPortalUrl", cfg.PREMIUM_PORTAL_URL],
    ["dashboardSessionUrl", cfg.DASHBOARD_SESSION_URL],
    ["username", cfg.USERNAME],
  ];
  for (var i = 0; i < qp.length; i++) {
    var val = qp[i][1];
    if (val != null && val !== "") u.searchParams.set(qp[i][0], String(val));
  }

  var id = LOADER.containerId || "powerups-edge-widget-host";
  var z = LOADER.zIndex != null ? LOADER.zIndex : 2147483000;
  var wrap = document.getElementById(id);
  if (!wrap) {
    wrap = document.createElement("div");
    wrap.id = id;
    document.body.appendChild(wrap);
  }
  wrap.setAttribute("data-powerups-widget-host", "");
  wrap.style.cssText = [
    "position:fixed", "inset:0", "width:100%", "height:100%",
    "border:0", "margin:0", "padding:0", "pointer-events:none",
    "z-index:" + String(z), "background:transparent",
  ].join(";");

  var ifr = document.createElement("iframe");
  ifr.setAttribute("title", LOADER.frameTitle || "InsightFlow asistente");
  ifr.setAttribute(
    "sandbox",
    "allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation",
  );
  ifr.setAttribute("allow", "clipboard-write");
  ifr.referrerPolicy = "strict-origin-when-cross-origin";
  ifr.style.cssText = [
    "position:absolute", "right:0", "bottom:0", "left:auto", "top:auto",
    "width:min(960px,100vw)", "height:min(92vh,100vh)", "max-height:100vh",
    "border:0", "margin:0", "padding:0", "background:transparent",
    "pointer-events:auto",
  ].join(";");
  ifr.src = u.toString();
  wrap.appendChild(ifr);
})();
</script>
