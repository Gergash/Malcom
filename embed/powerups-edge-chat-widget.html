<style>
.powerups-edge {
  --pu-bg: #0e1116;
  --pu-surface: #161b24;
  --pu-border: #2a3344;
  --pu-text: #e8edf5;
  --pu-muted: #8b98a8;
  --pu-accent: #28468C;
  --pu-accent-bright: #3a5fb8;
  --pu-danger: #c94b4b;
  --pu-radius: 12px;
  --pu-shadow: 0 12px 40px rgba(0,0,0,.45);
  font-family: system-ui, "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  color: var(--pu-text);
  position: fixed;
  right: max(16px, env(safe-area-inset-right));
  bottom: max(16px, env(safe-area-inset-bottom));
  z-index: 999999;
  box-sizing: border-box;
  overflow: visible;
}
.powerups-edge *, .powerups-edge *::before, .powerups-edge *::after { box-sizing: border-box; }
.powerups-edge__toggle {
  --sparkle-color: #9ec5ff;
  --sparkle-shadow: #1a2f5c;
  --sparkle-glare: hsl(0 0% 100% / 0.78);
  --sparkle-font-size: clamp(0.8rem, 2.2vw, 0.95rem);
  --sparkle-padding: 10px;
  --hover: 0;
  --pos: 0;
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 18px;
  border-radius: 999px;
  border: 1px solid var(--pu-border);
  background: linear-gradient(145deg, var(--pu-surface), #0f141d);
  color: var(--pu-text);
  cursor: pointer;
  box-shadow: var(--pu-shadow);
  font-family: inherit;
  font-weight: 600;
  letter-spacing: 0.02em;
  overflow: visible;
  transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}
.powerups-edge__toggle:hover {
  border-color: var(--pu-accent);
  --hover: 1;
  --pos: 1;
  background: linear-gradient(145deg, #1a2230, #121824);
}
.powerups-edge__toggle:active { --hover: 0; }
.powerups-edge__toggle:focus-visible { outline: 2px solid var(--pu-accent); outline-offset: 3px; }
.powerups-edge__sparkle-layer {
  position: absolute;
  inset: -8px -14px -12px -14px;
  pointer-events: none;
  z-index: 1;
}
.powerups-edge__sparkle-layer svg {
  position: absolute;
  z-index: 3;
  width: calc(var(--sparkle-font-size) * 0.48);
  aspect-ratio: 1;
  --delay-step: 0.15;
  top: calc(var(--y, 50) * 1%);
  left: calc(var(--x, 0) * 1%);
  transform: translate(-50%, -50%) scale(0);
}
.powerups-edge__sparkle-layer svg path { fill: var(--sparkle-glare); }
.powerups-edge__toggle:hover .powerups-edge__sparkle-layer svg {
  animation: powerups-edge-sparkle 0.75s calc((var(--delay-step) * var(--d)) * 1s) both;
}
.powerups-edge__sparkle-layer svg:nth-of-type(1) { --x: 8; --y: 18; --s: 1.1; --d: 1; }
.powerups-edge__sparkle-layer svg:nth-of-type(2) { --x: 22; --y: 82; --s: 1.22; --d: 2; }
.powerups-edge__sparkle-layer svg:nth-of-type(3) { --x: 48; --y: 38; --s: 1.08; --d: 3; }
.powerups-edge__sparkle-layer svg:nth-of-type(4) { --x: 72; --y: 68; --s: 0.92; --d: 2; }
.powerups-edge__sparkle-layer svg:nth-of-type(5) { --x: 92; --y: 24; --s: 0.82; --d: 4; }
@keyframes powerups-edge-sparkle {
  0%, 100% { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
  40%, 60% { transform: translate(-50%, -50%) scale(var(--s, 1)); opacity: 1; }
}
.powerups-edge__toggle-face {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  z-index: 2;
  padding: 0 var(--sparkle-padding);
}
.powerups-edge__toggle-icon { color: var(--pu-accent-bright); display: flex; flex-shrink: 0; }
.powerups-edge__toggle-brand {
  position: relative;
  display: inline-block;
  line-height: 1.15;
}
.powerups-edge__toggle-label {
  display: inline-block;
  font-size: calc(var(--sparkle-font-size) * 1.15);
  font-weight: 700;
  transition: transform 0.2s ease, text-shadow 0.2s ease;
  text-shadow:
    calc(var(--hover) * (var(--sparkle-font-size) * -0.02)) calc(var(--hover) * (var(--sparkle-font-size) * 0.02)) var(--sparkle-shadow),
    calc(var(--hover) * (var(--sparkle-font-size) * -0.05)) calc(var(--hover) * (var(--sparkle-font-size) * 0.05)) var(--sparkle-shadow),
    calc(var(--hover) * (var(--sparkle-font-size) * -0.08)) calc(var(--hover) * (var(--sparkle-font-size) * 0.08)) var(--sparkle-shadow);
  transform: translate(
    calc(var(--hover) * (var(--sparkle-font-size) * 0.1)),
    calc(var(--hover) * (var(--sparkle-font-size) * -0.06))
  );
}
.powerups-edge__toggle-label--shine {
  position: absolute;
  inset: 0;
  display: inline-block;
  font-size: calc(var(--sparkle-font-size) * 1.15);
  font-weight: 700;
  background: linear-gradient(
    108deg,
    transparent 0 52%,
    var(--sparkle-glare) 52% 58%,
    transparent 58% 72%,
    var(--sparkle-glare) 72% 88%,
    transparent 88%
  ) calc(var(--pos) * -200%) 0% / 200% 100%, var(--sparkle-color);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: none;
  white-space: nowrap;
  pointer-events: none;
  transform: translate(
    calc(var(--hover) * (var(--sparkle-font-size) * 0.1)),
    calc(var(--hover) * (var(--sparkle-font-size) * -0.06))
  );
  transition: transform 0.2s ease, background-position 0s ease;
}
.powerups-edge__toggle:hover .powerups-edge__toggle-label--shine {
  transition: transform 0.2s ease, background-position calc(var(--hover) * 1.35s) calc(var(--hover) * 0.22s) ease;
}
.powerups-edge__panel {
  position: absolute;
  right: 0;
  bottom: calc(100% + 10px);
  width: min(400px, calc(100vw - 32px));
  max-height: min(620px, calc(100vh - 100px));
  display: flex;
  flex-direction: column;
  background: var(--pu-bg);
  border: 1px solid var(--pu-border);
  border-radius: var(--pu-radius);
  box-shadow: var(--pu-shadow);
  overflow: hidden;
  transform-origin: 100% 100%;
  opacity: 0;
  transform: scale(0.88);
  pointer-events: none;
  visibility: hidden;
  transition:
    opacity 0.32s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.38s cubic-bezier(0.34, 1.15, 0.64, 1),
    visibility 0s linear 0.38s;
}
.powerups-edge.is-open .powerups-edge__panel {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
  visibility: visible;
  transition:
    opacity 0.34s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.4s cubic-bezier(0.34, 1.15, 0.64, 1),
    visibility 0s linear 0s;
}
@media (prefers-reduced-motion: reduce) {
  .powerups-edge__panel {
    transition: opacity 0.15s ease, visibility 0s;
    transform: none;
  }
  .powerups-edge.is-open .powerups-edge__panel { transform: none; }
  .powerups-edge__toggle:hover .powerups-edge__sparkle-layer svg { animation: none; }
}

  border-color: var(--pu-accent-bright);
}
/* Un solo estado visible: el tema WP a veces rompe [hidden]; usamos .is-processing */
.powerups-edge__send .powerups-edge__send-label--idle {
  display: inline;
}
.powerups-edge__send .powerups-edge__send-label--busy {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 600;
}
.powerups-edge__send.is-processing .powerups-edge__send-label--idle {
  display: none !important;
}
.powerups-edge__send.is-processing .powerups-edge__send-label--busy {
  display: inline-flex !important;
}
.powerups-edge__send-spinner {
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: none;
}
.powerups-edge__send.is-processing .powerups-edge__send-spinner {
  animation: powerups-edge-spin 0.65s linear infinite;
}
@keyframes powerups-edge-spin {
  to { transform: rotate(360deg); }
}
.powerups-edge__send:disabled {
  opacity: 0.85;
  cursor: not-allowed;
}
.powerups-edge__send[aria-busy="true"] {
  opacity: 1;
  pointer-events: none;
}
.powerups-edge__legal {
  margin: 0;
  padding: 8px 14px 10px;
  font-size: 10px;
  color: var(--pu-muted);
  text-align: center;
  border-top: 1px solid rgba(42,51,68,0.5);
  background: var(--pu-bg);
}
.powerups-edge__download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #b8922a;
  background: linear-gradient(135deg, #2a1f08, #1a1305);
  color: #f0c060;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: border-color 0.15s, background 0.15s;
}
.powerups-edge__download-btn:hover {
  border-color: #f0c060;
  background: linear-gradient(135deg, #3a2a0c, #271c07);
}
.powerups-edge__download-btn--basic {
  border-color: #4a5568;
  background: linear-gradient(135deg, #1a1f2e, #111522);
  color: #a0aec0;
}
.powerups-edge__download-btn--basic:hover {
  border-color: #718096;
  background: linear-gradient(135deg, #222840, #181d30);
}
@media (max-width: 480px) {
  .powerups-edge__panel { right: 0; left: auto; width: calc(100vw - 24px); }
  .powerups-edge__send {
    min-height: 52px;
    min-width: 104px;
    padding: 14px 20px;
    font-size: 16px;
  }
  .powerups-edge__composer { gap: 8px; padding: 12px 10px 14px; }
}
</style>

<script>
(function () {
  var CONFIG = {
    // URL del API FastAPI (sin barra final)
    API_BASE: 'https://meroblastic-estefana-isoperimetrical.ngrok-free.dev',
    // Pasarela Wompi / ePayco / página de producto WooCommerce. Puedes usar {chatId} en la cadena.
    CHECKOUT_URL: 'https://tu-tienda.com/premium-edge-bi/?chat_id={chatId}',
    // Opcional: nombre para registro en el backend
    USERNAME: null,
    STORAGE_KEY_CHAT: 'powerups_edge_chat_id_v1',
    STORAGE_KEY_HISTORY: 'powerups_edge_history_v1',
    // Mensajes enviados al agente cuando el usuario ya es premium y pulsa las acciones
    PROMPT_PDF: 'Genera el informe PDF premium consolidado de este hilo de análisis, listo para presentación ejecutiva.',
    PROMPT_EXCEL: 'Exporta un libro Excel con gráficas a partir del análisis actual (hojas claras y un gráfico por insight clave).',
  };

  function el(id) { return document.getElementById(id); }

  /** Evita la página intersticial de ngrok (tunnel gratuito) en peticiones al API. */
  function apiHeaders(extra) {
    var h = { 'ngrok-skip-browser-warning': 'true' };
    if (extra) {
      for (var k in extra) {
        if (Object.prototype.hasOwnProperty.call(extra, k)) h[k] = extra[k];
      }
    }
    return h;
  }

  function getOrCreateChatId() {
    var raw = localStorage.getItem(CONFIG.STORAGE_KEY_CHAT);
    var n = raw ? parseInt(raw, 10) : NaN;
    if (!isFinite(n) || n <= 0) {
      n = Math.floor(1e9 + Math.random() * 8.99e9);
      localStorage.setItem(CONFIG.STORAGE_KEY_CHAT, String(n));
    }
    return n;
  }

  function checkoutUrl() {
    var id = getOrCreateChatId();
    return String(CONFIG.CHECKOUT_URL).replace(/\{chatId\}/g, String(id));
  }

  function loadHistory() {
    try {
      var raw = localStorage.getItem(CONFIG.STORAGE_KEY_HISTORY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }

  function saveHistory(items) {
    try {
      localStorage.setItem(CONFIG.STORAGE_KEY_HISTORY, JSON.stringify(items.slice(-200)));
    } catch (e) { /* ignore quota */ }
  }

  async function setImageWithNgrokBypass(img, imageUrl) {
    try {
      var res = await fetch(imageUrl, {
        method: 'GET',
        headers: { 'ngrok-skip-browser-warning': 'true' },
        credentials: 'omit',
      });
      if (!res.ok) throw new Error('No se pudo descargar la imagen');
      var blob = await res.blob();
      var objectUrl = URL.createObjectURL(blob);
      img.onload = function () {
        setTimeout(function () { URL.revokeObjectURL(objectUrl); }, 1000);
      };
      img.src = objectUrl;
    } catch (e) {
      // Fallback por si el proxy/cdn bloquea fetch custom headers
      img.src = imageUrl;
    }
  }

  /**
   * Añade un mensaje al hilo.
   * - imageUrl: inserta <img> debajo del texto si es mensaje de bot.
   * - downloadInfo: { url, label } → inserta un botón de descarga del reporte.
   */
  function appendMessage(role, text, imageUrl, downloadInfo) {
    var box = el('powerups-edge-messages');
    var d = document.createElement('div');
    d.className = 'powerups-edge__msg powerups-edge__msg--' + (role === 'user' ? 'user' : role === 'sys' ? 'sys' : 'bot');
    var textEl = document.createElement('div');
    textEl.className = 'powerups-edge__msg-text';
    textEl.textContent = text;
    d.appendChild(textEl);
    if (imageUrl && role === 'bot') {
      var img = document.createElement('img');
      img.className = 'powerups-edge__chart';
      img.alt = 'Gráfica del análisis (InsightFlow)';
      img.loading = 'lazy';
      img.decoding = 'async';
      img.referrerPolicy = 'no-referrer-when-downgrade';
      d.appendChild(img);
      setImageWithNgrokBypass(img, imageUrl);
    }
    if (downloadInfo && downloadInfo.url && role === 'bot') {
      var isPremium = downloadInfo.label && downloadInfo.label.indexOf('Corporativo') !== -1;
      var btn = document.createElement('a');
      btn.href = downloadInfo.url;
      btn.target = '_blank';
      btn.rel = 'noopener noreferrer';
      btn.className = 'powerups-edge__download-btn' + (isPremium ? '' : ' powerups-edge__download-btn--basic');
      btn.textContent = (isPremium ? '⬇ ' : '↓ ') + (downloadInfo.label || 'Descargar Reporte');
      d.appendChild(btn);
    }
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  function hydrateFromStorage() {
    el('powerups-edge-messages').innerHTML = '';
    loadHistory().forEach(function (m) {
      appendMessage(m.role, m.text, m.imageUrl || null);
    });
  }

  function pushHistory(role, text, imageUrl) {
    var h = loadHistory();
    var entry = { role: role, text: text, t: Date.now() };
    if (imageUrl) entry.imageUrl = imageUrl;
    h.push(entry);
    saveHistory(h);
  }

  function setComposerLocked(locked) {
    el('powerups-edge-input').disabled = locked;
    el('powerups-edge-send').disabled = locked;
    el('powerups-edge-file').disabled = locked;
  }

  /** Solo mientras fetch al API: reemplaza "Enviar" por "Pensando…" + spinner (clase .is-processing). */
  function setComposerSending(sending) {
    var sendBtn = el('powerups-edge-send');
    var input = el('powerups-edge-input');
    sendBtn.setAttribute('aria-busy', sending ? 'true' : 'false');
    sendBtn.classList.toggle('is-processing', !!sending);
    // BUG FIX: la rama else faltaba; sin ella, disabled quedaba true para siempre
    // y el chat se bloqueaba tras el primer mensaje hasta recargar la página.
    sendBtn.disabled = !!sending;
    if (input) input.disabled = !!sending;
  }

  function setUsageUI(state) {
    var textEl = el('powerups-edge-usage-text');
    var fill = el('powerups-edge-usage-fill');
    var banner = el('powerups-edge-paywall');
    if (!state) {
      textEl.textContent = 'Mensajes usados: —/—';
      fill.style.width = '0%';
      return;
    }
    var limit = state.free_message_limit || 7;
    if (state.is_premium) {
      textEl.textContent = 'Plan premium activo · mensajes ilimitados';
      fill.style.width = '100%';
      banner.hidden = true;
      setComposerLocked(false);
      return;
    }
    var used = Math.min(state.message_count, limit);
    textEl.textContent = 'Mensajes usados: ' + used + '/' + limit;
    var pct = Math.min(100, Math.round((used / limit) * 100));
    fill.style.width = pct + '%';
    var wall = !!state.paywall;
    banner.hidden = !wall;
    setComposerLocked(wall);
  }

  async function fetchCredits() {
    var id = getOrCreateChatId();
    var url = CONFIG.API_BASE + '/api/v1/chat/' + encodeURIComponent(String(id)) + '/credits';
    var res = await fetch(url, { method: 'GET', headers: apiHeaders(), credentials: 'omit' });
    if (!res.ok) throw new Error('No se pudo obtener créditos');
    return res.json();
  }

  async function refreshCredits() {
    try {
      var j = await fetchCredits();
      setUsageUI(j);
      return j;
    } catch (e) {
      el('powerups-edge-usage-text').textContent = 'Estado de uso no disponible';
      return null;
    }
  }

  async function fetchBillingStatus() {
    var id = getOrCreateChatId();
    var url = CONFIG.API_BASE + '/api/v1/billing/status?chat_id=' + encodeURIComponent(String(id));
    var res = await fetch(url, { headers: apiHeaders(), credentials: 'omit' });
    if (!res.ok) throw new Error('billing/status');
    return res.json();
  }

  async function sendChatMessage(text) {
    var id = getOrCreateChatId();
    var body = { chat_id: id, message: text };
    if (CONFIG.USERNAME) body.username = CONFIG.USERNAME;
    var res = await fetch(CONFIG.API_BASE + '/api/v1/chat', {
      method: 'POST',
      headers: apiHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body),
      credentials: 'omit',
    });
    var j = await res.json().catch(function () { return {}; });
    if (!res.ok) {
      var det = j.detail || j.message || res.statusText;
      throw new Error(typeof det === 'string' ? det : 'Error del servidor');
    }
    return j;
  }

  async function uploadFile(file) {
    var id = getOrCreateChatId();
    var fd = new FormData();
    fd.append('chat_id', String(id));
    fd.append('file', file, file.name);
    var res = await fetch(CONFIG.API_BASE + '/api/v1/chat/upload', {
      method: 'POST',
      headers: apiHeaders(),
      body: fd,
      credentials: 'omit',
    });
    var j = await res.json().catch(function () { return {}; });
    if (!res.ok) {
      var det = j.detail || j.message || res.statusText;
      throw new Error(typeof det === 'string' ? det : 'Fallo al subir');
    }
    return j;
  }

  async function premiumAction(prompt) {
    try {
      var bill = await fetchBillingStatus();
      if (!bill.is_premium) {
        window.location.href = checkoutUrl();
        return;
      }
      appendMessage('user', '[Acción premium] ' + (prompt === CONFIG.PROMPT_PDF ? 'Generar Informe PDF Premium' : 'Exportar Excel con Gráficas'), null, null);
      pushHistory('user', '[Acción premium] Solicitud de entregable');
      var out = await sendChatMessage(prompt);
      var imgUrl = out.image_url || out.imageUrl || null;
      var dlInfo = (out.download_url) ? { url: out.download_url, label: out.download_label || 'Descargar Reporte' } : null;
      appendMessage('bot', out.response || '(Sin texto de respuesta)', imgUrl, dlInfo);
      pushHistory('bot', out.response || '', imgUrl);
      await refreshCredits();
    } catch (e) {
      appendMessage('sys', 'No se pudo completar la acción: ' + (e.message || e), null);
    }
  }

  function wireUI() {
    var root = el('powerups-edge-chat');
    var panel = el('powerups-edge-panel');
    var toggle = el('powerups-edge-toggle');
    var closeBtn = el('powerups-edge-close');
    var form = el('powerups-edge-form');
    var input = el('powerups-edge-input');
    var sendBtn = el('powerups-edge-send');
    var file = el('powerups-edge-file');

    toggle.addEventListener('click', function () {
      var open = !root.classList.contains('is-open');
      root.classList.toggle('is-open', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      panel.setAttribute('aria-hidden', open ? 'false' : 'true');
      if (open) {
        hydrateFromStorage();
        refreshCredits();
        setTimeout(function () { input.focus(); }, 280);
      }
    });
    closeBtn.addEventListener('click', function () {
      root.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
      panel.setAttribute('aria-hidden', 'true');
    });

    el('powerups-edge-paywall-pay').addEventListener('click', function () {
      window.location.href = checkoutUrl();
    });
    el('powerups-edge-btn-pdf').addEventListener('click', function () { premiumAction(CONFIG.PROMPT_PDF); });
    el('powerups-edge-btn-excel').addEventListener('click', function () { premiumAction(CONFIG.PROMPT_EXCEL); });

    form.addEventListener('submit', async function (ev) {
      ev.preventDefault();
      var t = (input.value || '').trim();
      if (!t) return;
      if (sendBtn && sendBtn.disabled) return;
      var st = await refreshCredits();
      if (st && st.paywall && !st.is_premium) return;

      setComposerSending(true);

      input.value = '';
      appendMessage('user', t, null);
      pushHistory('user', t);

      try {
        var out = await sendChatMessage(t);
        var imgU = out.image_url || out.imageUrl || null;
        var dlInfo = (out.download_url) ? { url: out.download_url, label: out.download_label || 'Descargar Reporte' } : null;
        if (out.paywall) {
          appendMessage('bot', out.response || 'Límite alcanzado.', null, null);
          pushHistory('bot', out.response || '');
        } else {
          appendMessage('bot', out.response || '(Sin respuesta)', imgU, dlInfo);
          pushHistory('bot', out.response || '', imgU);
        }
      } catch (err) {
        appendMessage('sys', 'Error: ' + (err.message || err), null, null);
      } finally {
        // BUG FIX: setComposerSending(false) va primero para garantizar que el
        // compositor se re-habilite incluso si refreshCredits() falla o devuelve
        // null (cuando retorna null, setUsageUI hace return temprano sin llamar
        // setComposerLocked, dejando los inputs bloqueados indefinidamente).
        // refreshCredits() aplica después el bloqueo de paywall si corresponde.
        setComposerSending(false);
        await refreshCredits();
      }
    });

    file.addEventListener('change', async function () {
      var f = file.files && file.files[0];
      if (!f) return;
      file.value = '';
      var st = await refreshCredits();
      if (st && st.paywall && !st.is_premium) {
        appendMessage('sys', 'Primero desbloquea el análisis para adjuntar archivos.', null);
        return;
      }
      appendMessage('sys', 'Subiendo: ' + f.name + '…', null);
      try {
        var up = await uploadFile(f);
        var msg = up.message || ('Archivo recibido' + (up.indexed ? ' (indexado).' : '.'));
        appendMessage('bot', msg, null);
        pushHistory('bot', msg);
      } catch (err) {
        appendMessage('sys', 'No se pudo subir el archivo: ' + (err.message || err), null);
      }
    });
  }

  if (document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', wireUI);
  else
    wireUI();
})();
</script>
